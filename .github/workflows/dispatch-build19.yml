name: Dispatch APK build from PR

on:
  pull_request:
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch signed APK workflow
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          gh workflow run build-apk.yml \
            --repo zhangzheyuanviolin-ship-it/offline-ai-assistant-android \
            --ref "$HEAD_REF" \
            -f version_name=1.0.0
          sleep 10
          gh run list \
            --repo zhangzheyuanviolin-ship-it/offline-ai-assistant-android \
            --workflow build-apk.yml \
            --branch "$HEAD_REF" \
            --limit 1 \
            --json databaseId,status,conclusion,url,headSha,event
