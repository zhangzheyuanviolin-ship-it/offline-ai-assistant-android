name: Dispatch build19 APK

on:
  pull_request:
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch signed APK workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build-apk.yml \
            --repo zhangzheyuanviolin-ship-it/offline-ai-assistant-android \
            --ref agent/build19-diagnostics-stability \
            -f version_name=1.0.0
          sleep 10
          gh run list \
            --repo zhangzheyuanviolin-ship-it/offline-ai-assistant-android \
            --workflow build-apk.yml \
            --branch agent/build19-diagnostics-stability \
            --limit 1 \
            --json databaseId,status,conclusion,url,headSha,event