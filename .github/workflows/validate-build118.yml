name: Validate Build118 Patches

on:
  push:
    branches:
      - agent/build98-hyperos-memory-diagnostics

permissions:
  contents: read

concurrency:
  group: validate-build118-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check patch script syntax
        run: |
          node --check scripts/apply-build118-low-residency-evidence.mjs
          node --check scripts/inject-build118-evidence-native.mjs
      - name: Execute source patches
        run: |
          node scripts/apply-build22-real-inference-process.mjs
          node scripts/apply-build98-hyperos-memory.mjs
          node scripts/apply-build118-low-residency-evidence.mjs
          grep -F "cache_type_v: 'f16'" "app/(tabs)/settings.tsx"
          grep -F 'Share.share' "app/(tabs)/settings.tsx"
          grep -F 'performLowResidencyDrop' lib/services/inference-worker.ts
          grep -F 'getInferenceDiagnosticLog' lib/services/runtime-memory.ts
