name: Build Signed Android APK

on:
  push:
    branches: [main, agent/build19-diagnostics-stability]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Apply native tool parser base
        run: pnpm build20:patch

      - name: Apply build41 sustainable architecture
        id: build41_patch
        run: |
          python3 - << 'PYEOF'
          path = 'scripts/apply-build41-patches.mjs'
          content = open(path, 'r', encoding='utf-8').read()
          content = content.replace(
              'return content.slice(0, startIndex) + replacement + content.slice(endIndex);',
              'return content.slice(0, startIndex) + replacement + content.slice(endIndex + end.length);'
          )
          content = content.replace(
              "const pusherStart = '  // 创建 token 推送器';",
              "const pusherStart = '  const createPushToken = useCallback(() => {';"
          )
          content = content.replace(
              "const pusherEnd = '  // 发送消息';",
              "const pusherEnd = '  const handleSend = useCallback(async () => {';"
          )
          open(path, 'w', encoding='utf-8').write(content)
          PYEOF
          set +e
          node scripts/apply-build41-patches.mjs > build41-patch.log 2>&1
          status=$?
          cat build41-patch.log
          if [ $status -ne 0 ]; then
            tail -160 build41-patch.log > build41-patch-error.txt
            exit $status
          fi
          python3 - << 'PYEOF'
          import re
          index_path = 'app/(tabs)/index.tsx'
          index = open(index_path, 'r', encoding='utf-8').read()
          index = re.sub(r'^\s*pusher\.(?:cancel|flush)\(\);\s*\n', '', index, flags=re.M)
          index = re.sub(r"^\s*setStreamContent\(''\);\s*\n", '', index, flags=re.M)
          open(index_path, 'w', encoding='utf-8').write(index)

          model_path = 'lib/services/model-service.ts'
          model = open(model_path, 'r', encoding='utf-8').read()
          model = model.replace(
              'messages?: Array<{ role: string; content: unknown }>;',
              'messages?: Array<{ role: string; content?: unknown }>;'
          )
          open(model_path, 'w', encoding='utf-8').write(model)
          PYEOF

      - name: Upload build41 patch error
        if: failure() && steps.build41_patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build41-patch-error
          path: build41-patch-error.txt
          retention-days: 7

      - name: Validate critical safety invariants
        run: |
          grep -F "runInferenceOrchestrator" "app/(tabs)/index.tsx"
          grep -F "role: 'tool'" "lib/services/inference-orchestrator.ts"
          grep -F "tool_calls: nativeCalls" "lib/services/inference-orchestrator.ts"
          grep -F "AccessibilityChunkedText" "app/(tabs)/index.tsx"
          grep -F "openExternalModelUri" "lib/services/model-service.ts"
          grep -F "activeModelId: nativeModelId," "lib/store.ts"
          grep -F "内存映射 (mmap)" "app/(tabs)/settings.tsx"
          grep -F "直接引用（推荐大模型）" "app/(tabs)/models.tsx"
          if grep -E "本轮已生成|MAX_TOOL_ROUNDS|createPushToken|pusher\.|setStreamContent" "app/(tabs)/index.tsx" "lib/services/inference-orchestrator.ts"; then
            echo "Catastrophic cumulative streaming or fixed tool cap remains" >&2
            exit 1
          fi
          if grep -F "data.content ?? data.token" "app/(tabs)/index.tsx" "lib/services/inference-orchestrator.ts"; then
            echo "Cumulative llama.rn content is still being appended as a token" >&2
            exit 1
          fi

      - name: TypeScript validation
        id: typecheck
        run: |
          set +e
          pnpm check > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          if [ $status -ne 0 ]; then
            cp typecheck.log typecheck-error.txt
            exit $status
          fi

      - name: Upload TypeScript error
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build41-typecheck-error
          path: typecheck-error.txt
          retention-days: 7

      - name: Materialize validated runtime sources
        if: success() && github.ref_name == 'agent/build20-tools-thinking-large-models'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            'app/(tabs)/index.tsx' \
            'app/(tabs)/models.tsx' \
            'app/(tabs)/settings.tsx' \
            'lib/types.ts' \
            'lib/store.ts' \
            'lib/services/model-service.ts' \
            'lib/services/tools-service.ts'
          if git diff --cached --quiet; then
            echo "Validated sources are already materialized"
          else
            git commit -m "refactor: materialize validated build41 runtime sources"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Expo prebuild Android
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Inject external GGUF SAF bridge
        run: |
          node scripts/inject-external-model-native.mjs
          grep -R -F "class ExternalModelFileModule" android/app/src/main/java
          grep -R -F "add(ExternalModelFilePackage())" android/app/src/main/java
          grep -R -F '"/proc/self/fd/$fd"' android/app/src/main/java

      - name: Decode and place keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/offline-ai-assistant.keystore
          ls -lh android/app/offline-ai-assistant.keystore

      - name: Configure signing in build.gradle
        run: |
          python3 - << 'PYEOF'
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          signing_config = """
              signingConfigs {
                  release {
                      storeFile file("offline-ai-assistant.keystore")
                      storePassword System.getenv("ANDROID_STORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          """
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_config + '    buildTypes {')
          content = re.sub(r'(buildTypes\s*\{[^}]*release\s*\{)', r'\1\n            signingConfig signingConfigs.release', content, count=1)
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print("Signing config injected successfully")
          PYEOF

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=1g" \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename and move APK
        run: |
          VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          BUILD_NUM="${{ github.run_number }}"
          APK_NAME="OfflineAIAssistant-v${VERSION}-build${BUILD_NUM}.apk"
          APK_SRC=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_SRC" ]; then
            APK_SRC=$(find android -name "*.apk" -not -path "*/intermediates/*" | head -1)
          fi
          echo "Source APK: $APK_SRC"
          mkdir -p dist
          cp "$APK_SRC" "dist/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_PATH=dist/$APK_NAME" >> $GITHUB_ENV
          sha256sum "dist/$APK_NAME" | tee dist/SHA256SUMS.txt
          ls -lh "dist/$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name || '1.0.0' }}-build${{ github.run_number }}
          name: "Offline AI Assistant v${{ github.event.inputs.version_name || '1.0.0' }} (Build ${{ github.run_number }})"
          body: |
            ## Build41 safety and architecture release
            - Removes the build39 cumulative-content loop that caused quadratic JS memory growth and screen-reader lockups.
            - Uses the official llama.rn assistant/tool message pattern for unrestricted multi-step tool chains.
            - Keeps every user-enabled tool available on every tool round; only repeated identical-call loops are stopped.
            - Separates reasoning from final answers and exposes long text in bounded screen-reader chunks.
            - Adds direct external GGUF references through Android SAF file descriptors without copying model weights.
            - Keeps copy import as a compatibility option.
            - Makes native runtime context the sole authority for loaded/unloaded model state.
            - Adds user-controlled mmap, mlock and n_ubatch settings plus an optional 30B MoE preset.
            - Isolates Tavily, Exa, DuckDuckGo and Baidu adapters so a parser fix cannot silently change another engine.
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "**APK**: \`${{ env.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
