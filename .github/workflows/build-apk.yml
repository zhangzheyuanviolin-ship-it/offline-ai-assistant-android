name: Build Signed Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── pnpm (must come before setup-node to avoid version conflict) ──────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # ── Node ──────────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ── Gradle cache ─────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Expo Prebuild ─────────────────────────────────────────────────────────
      - name: Expo prebuild (Android)
        run: |
          npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      # ── Keystore ──────────────────────────────────────────────────────────────
      - name: Decode and place keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/offline-ai-assistant.keystore
          ls -lh android/app/offline-ai-assistant.keystore

      # ── Signing config ────────────────────────────────────────────────────────
      - name: Configure signing in build.gradle
        run: |
          # Inject signing config into android/app/build.gradle
          python3 - << 'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_config = """
              signingConfigs {
                  release {
                      storeFile file("offline-ai-assistant.keystore")
                      storePassword System.getenv("ANDROID_STORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          """

          # Insert signingConfigs before buildTypes
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_config + '    buildTypes {')

          # Set release buildType to use release signingConfig
          content = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              content,
              count=1
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("Signing config injected successfully")
          PYEOF

      # ── Build APK ─────────────────────────────────────────────────────────────
      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=1g" \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── Rename APK ────────────────────────────────────────────────────────────
      - name: Rename and move APK
        run: |
          VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          BUILD_NUM="${{ github.run_number }}"
          APK_NAME="OfflineAIAssistant-v${VERSION}-build${BUILD_NUM}.apk"

          APK_SRC=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_SRC" ]; then
            APK_SRC=$(find android -name "*.apk" -not -path "*/intermediates/*" | head -1)
          fi

          echo "Source APK: $APK_SRC"
          mkdir -p dist
          cp "$APK_SRC" "dist/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_PATH=dist/$APK_NAME" >> $GITHUB_ENV
          ls -lh "dist/$APK_NAME"

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 90

      # ── Create Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name || '1.0.0' }}-build${{ github.run_number }}
          name: "Offline AI Assistant v${{ github.event.inputs.version_name || '1.0.0' }} (Build ${{ github.run_number }})"
          body: |
            ## Offline AI Assistant APK

            **版本**: v${{ github.event.inputs.version_name || '1.0.0' }} (Build ${{ github.run_number }})

            ### 功能
            - 本地离线 AI 推理（llama.rn + llama.cpp 最新版 b9888）
            - 聊天界面（流式输出）
            - GGUF 模型管理（导入/加载/卸载/删除）
            - 文件管理工具（ls/cat/write/mkdir/rm/mv/zip）
            - 多媒体处理工具（media_info/media_proc）
            - 网络搜索工具（Tavily AI / Exa AI / DuckDuckGo / 百度）
            - 推理参数设置（上下文长度/温度/重复惩罚等）
            - 完整无障碍支持（TalkBack）
            - 工具调用日志系统

            ### 安装说明
            1. 下载 APK 文件
            2. 在 Android 设置中允许安装未知来源应用
            3. 点击 APK 文件安装
            4. 首次使用需导入 GGUF 格式的模型文件

            ### 签名信息
            此 APK 使用持久化签名，后续版本可直接覆盖更新，无需卸载。
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "**APK**: \`${{ env.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Download from [Releases](https://github.com/zhangzheyuanviolin-ship-it/offline-ai-assistant-android/releases)" >> $GITHUB_STEP_SUMMARY
