name: Build Signed Android APK

on:
  push:
    branches: [main, agent/build19-diagnostics-stability]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Apply build21 base patches
        run: pnpm build20:patch

      - name: Apply build22 runtime patches
        id: build22_patch
        run: |
          python3 - << 'PYEOF'
          path = 'scripts/apply-build22-patches.mjs'
          content = open(path, 'r', encoding='utf-8').read()
          content = content.replace(
              'return content.slice(0, startIndex) + replacement + content.slice(endIndex);',
              'return content.slice(0, startIndex) + replacement + content.slice(endIndex + end.length);'
          )
          open(path, 'w', encoding='utf-8').write(content)
          PYEOF
          set +e
          node scripts/apply-build22-patches.mjs > build22-patch.log 2>&1
          status=$?
          cat build22-patch.log
          if [ $status -ne 0 ]; then
            tail -120 build22-patch.log > build22-patch-error.txt
            exit $status
          fi

      - name: Upload build22 patch error
        if: failure() && steps.build22_patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build22-patch-error
          path: build22-patch-error.txt
          retention-days: 7

      - name: Validate build22 critical paths
        run: |
          grep -F "const configuredNativeTools = buildNativeTools(toolsConfig);" "app/(tabs)/index.tsx"
          grep -F "const BUILD22_TOOL_LOOP_READY = true;" "app/(tabs)/index.tsx"
          grep -F "formatToolResultForModel" "app/(tabs)/index.tsx"
          grep -F "BUILD22_SEARCH_RESULTS_READY" "lib/services/tools-service.ts"
          grep -F "BUILD22_LARGE_MODEL_SAFE_PROFILE" "lib/services/model-service.ts"
          grep -F "n_ubatch" "app/(tabs)/settings.tsx"
          grep -F "large_model_safe_mode" "lib/types.ts"
          if grep -F "callback({ token: summary }" "lib/services/model-service.ts"; then
            echo "Performance diagnostics still contaminate model output" >&2
            exit 1
          fi
          if grep -F 'accessible accessibilityLabel={`AI：${response || content || activityText}`}' "app/(tabs)/index.tsx"; then
            echo "Streaming thinking control is still grouped into one accessibility node" >&2
            exit 1
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Decode and place keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/offline-ai-assistant.keystore
          ls -lh android/app/offline-ai-assistant.keystore

      - name: Configure signing in build.gradle
        run: |
          python3 - << 'PYEOF'
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          signing_config = """
              signingConfigs {
                  release {
                      storeFile file("offline-ai-assistant.keystore")
                      storePassword System.getenv("ANDROID_STORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          """
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_config + '    buildTypes {')
          content = re.sub(r'(buildTypes\s*\{[^}]*release\s*\{)', r'\1\n            signingConfig signingConfigs.release', content, count=1)
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print("Signing config injected successfully")
          PYEOF

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=1g" \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename and move APK
        run: |
          VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          BUILD_NUM="${{ github.run_number }}"
          APK_NAME="OfflineAIAssistant-v${VERSION}-build${BUILD_NUM}.apk"
          APK_SRC=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_SRC" ]; then
            APK_SRC=$(find android -name "*.apk" -not -path "*/intermediates/*" | head -1)
          fi
          echo "Source APK: $APK_SRC"
          mkdir -p dist
          cp "$APK_SRC" "dist/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_PATH=dist/$APK_NAME" >> $GITHUB_ENV
          ls -lh "dist/$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name || '1.0.0' }}-build${{ github.run_number }}
          name: "Offline AI Assistant v${{ github.event.inputs.version_name || '1.0.0' }} (Build ${{ github.run_number }})"
          body: |
            ## Offline AI Assistant build22 test release
            - Keeps performance diagnostics out of model text and tool results.
            - Parses DuckDuckGo result titles, decoded links, and snippets; rejects template placeholders.
            - Prevents repeated identical tool calls and keeps only the final answer.
            - Fixes independent expand/collapse controls for thinking content.
            - Adds mmap, mlock, n_ubatch, and large-model safe mode settings.
            - Applies conservative CPU/KV/batch settings to model files larger than 12 GB.
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "**APK**: \`${{ env.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Download from [Releases](https://github.com/zhangzheyuanviolin-ship-it/offline-ai-assistant-android/releases)" >> $GITHUB_STEP_SUMMARY
