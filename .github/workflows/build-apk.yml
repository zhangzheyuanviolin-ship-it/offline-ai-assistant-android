name: Build Signed Android APK

on:
  push:
    branches: [main, agent/build19-diagnostics-stability, agent/build20-tools-thinking-large-models]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name'
        required: false
        default: '1.0.0'

permissions:
  contents: write

concurrency:
  group: signed-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Apply real inference-process routing and Build98 memory experiment
        run: |
          node scripts/apply-build22-real-inference-process.mjs
          node scripts/apply-build98-hyperos-memory.mjs
          grep -F '"main": "index.js"' package.json
          grep -F 'createRemoteLlamaContext' lib/services/model-service.ts
          grep -F "cache_type_v: 'f16'" "app/(tabs)/settings.tsx"
          grep -F "registerHeadlessTask('OfflineInferenceWorker'" index.js
          grep -F 'low_residency_enabled' lib/types.ts
          grep -F 'getLatestInferenceDiagnostic' lib/services/runtime-memory.ts
          grep -F 'dropFileCache' lib/services/inference-worker.ts
          grep -F 'HyperOS 低驻留实验预设' "app/(tabs)/settings.tsx"

      - name: Validate architecture invariants
        run: |
          grep -F "AccessibilityStreamingText" "app/(tabs)/index.tsx"
          grep -F "onStream" "lib/services/inference-orchestrator.ts"
          grep -F "role: 'tool'" "lib/services/inference-orchestrator.ts"
          grep -F "tool_calls: nativeCalls" "lib/services/inference-orchestrator.ts"
          grep -F "resolveExternalModelUri" "lib/services/model-service.ts"
          grep -F "memoryGuardTriggered" "lib/services/model-service.ts"
          grep -F "activeModelId: nativeModelId" "lib/store.ts"
          grep -F "保存并立即重新加载" "app/(tabs)/settings.tsx"
          if grep -E "本轮已生成|MAX_TOOL_ROUNDS|createPushToken|pusher\.|setStreamContent" "app/(tabs)/index.tsx" "lib/services/inference-orchestrator.ts"; then
            echo "Legacy cumulative streaming or fixed tool cap remains" >&2
            exit 1
          fi
          if grep -F "data.content ?? data.token" "app/(tabs)/index.tsx" "lib/services/inference-orchestrator.ts"; then
            echo "Accumulated content is still being appended as an incremental token" >&2
            exit 1
          fi

      - name: TypeScript validation
        id: typecheck
        run: |
          set +e
          pnpm check > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          if [ $status -ne 0 ]; then
            cp typecheck.log typecheck-error.txt
            exit $status
          fi

      - name: Upload TypeScript error
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: isolated-inference-typecheck-error
          path: typecheck-error.txt
          retention-days: 7

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Expo prebuild Android
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Inject Android native bridges, isolated inference service and Build98 diagnostics
        run: |
          node scripts/inject-external-model-native.mjs
          node scripts/inject-real-inference-process.mjs
          node scripts/inject-build98-memory-native.mjs
          grep -R -F "class ExternalModelFileModule" android/app/src/main/java
          grep -R -F "class RuntimeMemoryModule" android/app/src/main/java
          grep -R -F "class InferenceProcessService" android/app/src/main/java
          grep -R -F "class InferenceProcessModule" android/app/src/main/java
          grep -R -F "class InferenceWorkerBridgeModule" android/app/src/main/java
          grep -R -F "InferenceWorkerBridgeModule(reactContext)" android/app/src/main/java
          grep -R -F "HeadlessJsTaskService" android/app/src/main/java
          grep -R -F "add(OfflineAiNativePackage())" android/app/src/main/java
          grep -R -F "POSIX_FADV_DONTNEED" android/app/src/main/java
          grep -R -F "Pss_File" android/app/src/main/java
          grep -R -F "getLatestInferenceDiagnostic" android/app/src/main/java
          grep -F 'android:process=":inference"' android/app/src/main/AndroidManifest.xml

      - name: Decode and place keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/offline-ai-assistant.keystore
          ls -lh android/app/offline-ai-assistant.keystore

      - name: Configure signing
        run: |
          python3 - << 'PYEOF'
          import re
          path = 'android/app/build.gradle'
          content = open(path, 'r', encoding='utf-8').read()
          signing_config = '''
              signingConfigs {
                  release {
                      storeFile file("offline-ai-assistant.keystore")
                      storePassword System.getenv("ANDROID_STORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          '''
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_config + '    buildTypes {')
          content = re.sub(r'(buildTypes\s*\{[^}]*release\s*\{)', r'\1\n            signingConfig signingConfigs.release', content, count=1)
          open(path, 'w', encoding='utf-8').write(content)
          PYEOF

      - name: Build release APK
        id: gradle_build
        run: |
          set +e
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=1g" \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true \
            > ../gradle-build.log 2>&1
          status=$?
          cd ..
          tail -240 gradle-build.log
          if [ $status -ne 0 ]; then
            cp gradle-build.log gradle-build-error.txt
            exit $status
          fi
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload native build error
        if: failure() && steps.gradle_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: isolated-inference-native-build-error
          path: gradle-build-error.txt
          retention-days: 7

      - name: Rename and verify APK
        run: |
          VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          BUILD_NUM="${{ github.run_number }}"
          APK_NAME="OfflineAIAssistant-v${VERSION}-build${BUILD_NUM}.apk"
          APK_SRC=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          test -n "$APK_SRC"
          mkdir -p dist
          cp "$APK_SRC" "dist/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_PATH=dist/$APK_NAME" >> $GITHUB_ENV
          sha256sum "dist/$APK_NAME" | tee dist/SHA256SUMS.txt
          ls -lh "dist/$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name || '1.0.0' }}-build${{ github.run_number }}
          name: "Offline AI Assistant v${{ github.event.inputs.version_name || '1.0.0' }} (Build ${{ github.run_number }})"
          body: |
            ## Build 98: HyperOS PSS diagnostics and low-residency experiment
            - Keeps llama.rn inference in the dedicated Android `:inference` process.
            - Persists inference-process Pss_File, Pss_Anon, RSS, SwapPss and system-memory samples throughout loading and generation.
            - Preserves the final memory sample when HyperOS force-stops the package, so it can be read after reopening the app.
            - Adds an optional low-residency mode that periodically issues POSIX_FADV_DONTNEED for the active GGUF file.
            - Leaves the experiment disabled by default and provides an accessible HyperOS preset in Settings.
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "**APK**: \`${{ env.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
