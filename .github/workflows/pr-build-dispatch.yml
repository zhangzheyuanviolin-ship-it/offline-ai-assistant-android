name: PR Signed Build Dispatch

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch signed build and report run
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.ref;
            const before = new Date(Date.now() - 60_000).toISOString();

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'build-apk.yml',
              ref,
              inputs: { version_name: '1.0.0' }
            });

            for (let attempt = 0; attempt < 30; attempt += 1) {
              await new Promise(resolve => setTimeout(resolve, 5000));
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'build-apk.yml',
                branch: ref,
                event: 'workflow_dispatch',
                per_page: 10
              });
              const run = response.data.workflow_runs.find(item => item.created_at >= before);
              if (run) {
                core.notice(`SIGNED_BUILD_RUN_ID=${run.id}`);
                core.notice(`SIGNED_BUILD_RUN_NUMBER=${run.run_number}`);
                core.notice(`SIGNED_BUILD_URL=${run.html_url}`);
                return;
              }
            }
            core.setFailed('Signed build was dispatched but its workflow run was not found.');
